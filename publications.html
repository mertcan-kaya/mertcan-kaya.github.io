<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications | Mertcan Kaya</title>
    <link rel="canonical" href="https://mertcan-kaya.github.io/publications.html">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --techslate: #212F3D; --textgray: #2D3748; --linkblue: #2980B9; --lightbg: #F8F9FA; --bordergray: #E2E8F0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: var(--textgray); line-height: 1.6; background-color: #FFFFFF; padding-top: 60px; }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        
        /* Navbar */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background-color: var(--techslate); z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-container { max-width: 1050px; margin: 0 auto; height: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .nav-brand { color: #FFFFFF; font-weight: 700; }
        
        /* Publications List */
        h2 { font-size: 1.8rem; color: var(--techslate); margin-bottom: 30px; border-bottom: 2px solid var(--linkblue); padding-bottom: 10px; display: inline-block; }
        .pub-list { list-style: none; }
        .pub-item { margin-bottom: 25px; padding-left: 15px; border-left: 3px solid var(--bordergray); transition: border-color 0.2s; }
        .pub-item:hover { border-left-color: var(--linkblue); }
        .pub-year { font-size: 0.85rem; color: var(--linkblue); font-weight: 700; margin-bottom: 2px; }
        .pub-title { font-weight: 700; font-size: 1.1rem; color: var(--techslate); margin-bottom: 4px; line-height: 1.3; }
        .pub-venue { font-size: 0.9rem; color: #4A5568; font-style: italic; margin-bottom: 10px; }
        .pub-actions { display: flex; gap: 8px; }
        .btn-small { font-size: 0.8rem; padding: 5px 12px; background: var(--lightbg); color: var(--techslate); border: 1px solid var(--bordergray); border-radius: 4px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
        .btn-small:hover { background: var(--bordergray); }

        footer { text-align: center; padding: 40px 0; color: #718096; font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand"><a href="index.html" style="color: white;">Mertcan Kaya // Robotics</a></div>
        </div>
    </nav>

    <div class="container">
        <h2>Full Publication Record</h2>

        <ul class="pub-list">
            <li class="pub-item">
                <div class="pub-year">2026</div>
                <div class="pub-title">Motor interference of elbow configuration changes in human-robot interaction</div>
                <div class="pub-venue">Interaction Studies (2026)</div>
                <div class="pub-actions">
                    <a href="https://doi.org/10.1075/is.25026.kay" target="_blank" rel="noopener noreferrer" class="btn-small"><i class="fas fa-link"></i> DOI</a>
                    <button class="btn-small"><i class="fas fa-quote-right"></i> BibTeX</button>
                </div>
            </li>
            </ul>
    </div>

    <footer>
        <p>&copy; 2026 Mertcan Kaya. <a href="index.html">Return to Homepage</a></p>
    </footer>

</body>
</html>
